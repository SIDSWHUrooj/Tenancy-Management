<!-- SUMMARY FIELDS (STANDARD FIELD SIZE) -->
<div class="row g-3 mb-4">

  <!-- Document Amount -->
  <div class="col-md-3">
    <label class="form-label fw-semibold">Document Amount</label>
    <div class="input-group">
      <span class="input-group-text bg-light text-muted small">AED</span>
      <input
        type="text"
        class="form-control text-end fw-semibold text-primary bg-light"
        [value]="totals.documentAmount | number:'1.2-2'"
        readonly>
    </div>
  </div>

  <!-- Tax Amount -->
  <div class="col-md-3">
    <label class="form-label fw-semibold">Tax Amount</label>
    <div class="input-group">
      <span class="input-group-text bg-light text-muted small">AED</span>
      <input
        type="text"
        class="form-control text-end fw-semibold text-primary bg-light"
        [value]="totals.taxAmount | number:'1.2-2'"
        readonly>
    </div>
  </div>

  <!-- Discount -->
  <div class="col-md-3">
    <label class="form-label fw-semibold">Discount</label>
    <div class="input-group">
      <span class="input-group-text bg-light text-muted small">AED</span>
      <input
        type="text"
        class="form-control text-end fw-semibold text-primary bg-light"
        [value]="totals.discountAmount | number:'1.2-2'"
        readonly>
    </div>
  </div>

  <!-- Grand Total (Blue Accent) -->
  <div class="col-md-3">
    <label class="form-label fw-semibold">Grand Total</label>
    <div class="input-group grand-total-group">
      <span class="input-group-text">AED</span>
      <input
        type="text"
        class="form-control text-end fw-bold"
        [value]="grandTotal | number:'1.2-2'"
        readonly>
    </div>
  </div>

</div>



<!-- NOTES & COMMENTS -->
<div class="card border-0 shadow-sm">
  <div class="card-header bg-white border-bottom py-3">
    <h5 class="mb-0 d-flex align-items-center">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-chat-left-text text-primary me-2" viewBox="0 0 16 16">
        <path d="M14 1a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H4.414A2 2 0 0 0 3 11.586l-2 2V2a1 1 0 0 1 1-1h12zM2 0a2 2 0 0 0-2 2v12.793a.5.5 0 0 0 .854.353l2.853-2.853A1 1 0 0 1 4.414 12H14a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H2z"/>
        <path d="M3 3.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5zM3 6a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9A.5.5 0 0 1 3 6zm0 2.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5z"/>
      </svg>
      Notes & Comments
    </h5>
  </div>
  <div class="card-body">
    <textarea
      rows="4"
      class="form-control bg-white"
      placeholder="Enter notes, remarks, special instructions..."
      [(ngModel)]="totals.comments">
    </textarea>
  </div>
</div>
